# Fuente
font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 12

# Transparencia y blur
background_opacity 0.85

# Padding
window_padding_width 10

# Cursor
cursor_shape beam
cursor_blink_interval 0.5

# Colores (Catppuccin Mocha)
foreground #cdd6f4
background #1e1e2e
selection_foreground #1e1e2e
selection_background #f5e0dc

# Negro
color0 #45475a
color8 #585b70

# Rojo
color1 #f38ba8
color9 #f38ba8

# Verde
color2 #a6e3a1
color10 #a6e3a1

# Amarillo
color3 #f9e2af
color11 #f9e2af

# Azul
color4 #89b4fa
color12 #89b4fa

# Magenta
color5 #f5c2e7
color13 #f5c2e7

# Cyan
color6 #94e2d5
color14 #94e2d5

# Blanco
color7 #bac2de
color15 #a6adc8

# URLs
url_color #89b4fa
url_style curly

# Tabs
tab_bar_style powerline
tab_powerline_style slanted
active_tab_foreground #1e1e2e
active_tab_background #89b4fa
inactive_tab_foreground #cdd6f4
inactive_tab_background #313244
